<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Threat Intelligence Dashboard</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="dashboard-container">
      <header class="dashboard-header">
        <h1>
          <i class="fa-solid fa-shield-halved"></i> AI Threat Intelligence
        </h1>
        <p>Hugging Face Transformer Models for URL & Log Analysis</p>
      </header>

      <div class="grid-layout">
        <div class="card">
          <h2><i class="fa-solid fa-link"></i> URL Analyzer</h2>
          <p class="subtitle">Detect phishing and malicious domains.</p>
          <div class="input-group">
            <input
              type="text"
              id="urlInput"
              placeholder="Enter URL to scan..."
              autocomplete="off"
            />
            <button onclick="analyzeURL()" id="urlBtn">Scan URL</button>
          </div>
          <div id="urlResult" class="result-box hidden"></div>
        </div>

        <div class="card">
          <h2><i class="fa-solid fa-server"></i> Server Log Analyzer</h2>
          <p class="subtitle">Zero-shot anomaly detection for web logs.</p>
          <div class="input-group">
            <textarea
              id="logInput"
              rows="3"
              placeholder="Paste server log entry here..."
            ></textarea>
            <button onclick="analyzeLog()" id="logBtn">Analyze Log</button>
          </div>
          <div id="logResult" class="result-box hidden"></div>
        </div>
      </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
